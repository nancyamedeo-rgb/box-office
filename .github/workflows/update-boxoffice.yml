name: Update Box Office Standings

on:
  schedule:
    # Box office numbers update a few times a week at most (estimates
    # Sun/Mon, actuals mid-week) — every 6 hours is plenty and stays
    # well within polite scraping limits.
    - cron: '20 */6 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-boxoffice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch latest box office chart
        run: python scripts/fetch_boxoffice.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/boxoffice.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update box office standings [automated]"
            git push
          fi
