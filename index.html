<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Office Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  #widget {
    width: 100%;
    background: transparent;
    font-family: sans-serif;
    overflow: hidden;
    position: relative;
    height: 520px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 14px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.18);
    margin-bottom: 8px;
  }
  .header-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .header-dot { width: 6px; height: 6px; border-radius: 50%; background: #f5c518; flex-shrink: 0; }
  .last-updated { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.35); }
  .scroll-viewport { overflow: hidden; height: 460px; position: relative; }
  .scroll-track { display: flex; flex-direction: column; gap: 0; }
  .movie-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    gap: 12px;
    flex-shrink: 0;
    min-height: 62px;
  }
  .rank { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.28); width: 20px; text-align: right; flex-shrink: 0; }
  .rank.top3 { color: #f5c518; }
  .movie-info { flex: 1; min-width: 0; }
  .movie-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.92); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .movie-meta { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 2px; }
  .movie-gross { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); text-align: right; flex-shrink: 0; min-width: 80px; }
  .bar-wrap { width: 60px; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; flex-shrink: 0; }
  .bar { height: 3px; border-radius: 2px; background: #f5c518; }
  .badge { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; flex-shrink: 0; }
  .badge-new { background: rgba(245,197,24,0.18); color: #f5c518; }
  .loading { color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; padding: 2rem 0; }
  .error { color: rgba(255,120,100,0.75); font-size: 12px; text-align: center; padding: 2rem 0; }
</style>
</head>
<body>

<div id="widget">
  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">Now in theaters</span>
    <span class="last-updated" id="updated-time"></span>
  </div>
  <div class="scroll-viewport">
    <div class="scroll-track" id="scroll-track">
      <div class="loading">Loading current box office…</div>
    </div>
  </div>
</div>

<script>
// ── Weekend box office data (June 5-7, 2026) ──────────────────────────────
// Update weekly from boxofficemojo.com or the-numbers.com
const BOX_OFFICE = {
  weekend: 'Weekend of June 5-7, 2026',
  movies: [
    { title: 'Scary Movie 6',                    weekend_gross: 55000000,  cumulative_gross: 55000000,   weeks_in_release: 1, is_new: true  },
    { title: 'Masters of the Universe',          weekend_gross: 29300000,  cumulative_gross: 29300000,   weeks_in_release: 1, is_new: true  },
    { title: 'Backrooms',                        weekend_gross: 25900000,  cumulative_gross: 135000000,  weeks_in_release: 2, is_new: false },
    { title: 'Obsession',                        weekend_gross: 25600000,  cumulative_gross: 152100000,  weeks_in_release: 3, is_new: false },
    { title: 'The Amazing Digital Circus: The Last Act', weekend_gross: 12300000, cumulative_gross: 20700000, weeks_in_release: 1, is_new: true  },
    { title: 'The Mandalorian & Grogu',          weekend_gross: 9800000,   cumulative_gross: 298000000,  weeks_in_release: 4, is_new: false },
    { title: 'Michael',                          weekend_gross: 7200000,   cumulative_gross: 185000000,  weeks_in_release: 5, is_new: false },
    { title: 'The Breadwinner',                  weekend_gross: 5100000,   cumulative_gross: 18400000,   weeks_in_release: 2, is_new: false },
    { title: 'Pressure',                         weekend_gross: 3800000,   cumulative_gross: 11200000,   weeks_in_release: 2, is_new: false },
    { title: 'The Devil Wears Prada 2',          weekend_gross: 2900000,   cumulative_gross: 210000000,  weeks_in_release: 6, is_new: false },
  ]
};

function fmt(n) {
  if (!n) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + Math.round(n/1e6) + 'M';
  return '$' + n.toLocaleString();
}

const SWATCHES = ['#1a1a2e','#16213e','#0f3460','#533483','#2d6a4f','#1b4332','#6b2d3e','#3d405b','#2c3e50','#1a3a4a'];
function getSwatch(i) { return SWATCHES[i % SWATCHES.length]; }
function getInitials(title) {
  return title.split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '♪';
}

function renderMovies(movies) {
  const track = document.getElementById('scroll-track');
  if (!movies || !movies.length) { track.innerHTML = '<div class="error">No data available.</div>'; return; }
  const maxGross = Math.max(...movies.map(m => m.weekend_gross || 0));
  const rows = movies.map((m, i) => `
    <div class="movie-row">
      <span class="rank ${i < 3 ? 'top3' : ''}">${i+1}</span>
      <div class="color-swatch" style="background:${getSwatch(i)}">${getInitials(m.title)}</div>
      <div class="movie-info">
        <div class="movie-title">${m.title}${m.is_new ? '<span class="badge badge-new">NEW</span>' : ''}</div>
        <div class="movie-meta">Weekend: ${fmt(m.weekend_gross)}${m.cumulative_gross ? ' · Total: ' + fmt(m.cumulative_gross) : ''}${m.weeks_in_release ? ' · Wk ' + m.weeks_in_release : ''}</div>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:${maxGross ? Math.round(((m.weekend_gross||0)/maxGross)*100) : 0}%"></div></div>
      <div class="movie-gross">${fmt(m.weekend_gross)}</div>
    </div>
  `).join('');
  track.innerHTML = rows + rows;
  startScroll(movies.length);
}

let animFrame;
function startScroll(count) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const track = document.getElementById('scroll-track');
  const ROW_H = 62;
  const totalH = ROW_H * count;
  let pos = 0, last = null;
  const SPEED = 0.4;
  function step(ts) {
    if (last !== null) pos += (ts - last) * SPEED / 1000 * 60;
    last = ts;
    if (pos >= totalH) pos -= totalH;
    track.style.transform = `translateY(-${pos}px)`;
    animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

function init() {
  document.getElementById('updated-time').textContent = BOX_OFFICE.weekend;
  renderMovies(BOX_OFFICE.movies);
}

init();
</script>

</body>
</html>
