<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Office Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  #widget {
    width: 100%;
    background: transparent;
    font-family: sans-serif;
    overflow: hidden;
    position: relative;
    height: 520px;
    color: white;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 10px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.18);
    margin-bottom: 6px;
  }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #f5c518; flex-shrink: 0; }
  .header-title {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    flex: 1;
  }
  .last-updated { font-size: 16px; color: rgba(255,255,255,0.35); }
  .scroll-viewport { overflow: hidden; height: 468px; position: relative; }
  .scroll-track { display: flex; flex-direction: column; }
  .movie-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    gap: 12px;
    flex-shrink: 0;
    min-height: 78px;
  }
  .rank {
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.28);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }
  .rank.top3 { color: #f5c518; }
  .poster {
    width: 46px;
    height: 68px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.08);
  }
  .movie-info { flex: 1; min-width: 0; }
  .movie-title {
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.92);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .movie-meta {
    font-size: 20px;
    color: rgba(255,255,255,0.38);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge {
    font-size: 14px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: 8px;
    vertical-align: middle;
    background: rgba(245,197,24,0.18);
    color: #f5c518;
  }
  .loading { color: rgba(255,255,255,0.4); font-size: 20px; text-align: center; padding: 2rem 0; }
  .error { color: rgba(255,120,100,0.75); font-size: 18px; text-align: center; padding: 2rem 0; line-height: 1.6; }
</style>
</head>
<body>
<div id="widget">
  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">Now in Theaters</span>
    <span class="last-updated" id="updated-time"></span>
  </div>
  <div class="scroll-viewport">
    <div class="scroll-track" id="scroll-track">
      <div class="loading">Loading movies…</div>
    </div>
  </div>
</div>

<script>
// Uses iTunes Movie Charts RSS feed — free, no API key, CORS-enabled
// Same approach as the working Billboard music widget
const CACHE_KEY  = 'itunes_movies_top_v1';
const CACHE_TS   = 'itunes_movies_top_ts_v1';
const ONE_DAY    = 86400000;
const ROW_H      = 78;
const SCROLL_SPEED = 0.22; // px per frame, same as billboard

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function buildRows(movies) {
  return movies.map((m, i) => {
    const rankClass = i < 3 ? 'rank top3' : 'rank';
    const posterEl = m.art
      ? `<img class="poster" src="${m.art}" alt="" loading="lazy">`
      : `<div class="poster"></div>`;
    const genreStr = m.genre ? ` · ${m.genre}` : '';
    const priceStr = m.price ? ` · ${m.price}` : '';
    return `<div class="movie-row">
      <div class="${rankClass}">${i + 1}</div>
      ${posterEl}
      <div class="movie-info">
        <div class="movie-title">${m.title}</div>
        <div class="movie-meta">${m.artist}${genreStr}${priceStr}</div>
      </div>
    </div>`;
  }).join('');
}

let animFrame;
function startScroll(count) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const track = document.getElementById('scroll-track');
  const totalH = ROW_H * count;
  let y = 0;
  function step() {
    y += SCROLL_SPEED;
    if (y >= totalH) y -= totalH;
    track.style.transform = `translateY(-${y}px)`;
    animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

function renderMovies(movies) {
  const track = document.getElementById('scroll-track');
  if (!movies || !movies.length) {
    track.innerHTML = '<div class="error">No data available.</div>';
    return;
  }
  const html = buildRows(movies);
  track.innerHTML = html + html; // duplicate for seamless loop
  startScroll(movies.length);
}

async function fetchMovies() {
  const now = Date.now();
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    const ts = parseInt(localStorage.getItem(CACHE_TS) || '0');
    if (cached && (now - ts) < ONE_DAY) return JSON.parse(cached);
  } catch(e) {}

  // iTunes Top Movies feed — CORS-enabled, free, no key
  const url = 'https://itunes.apple.com/us/rss/topmovies/limit=25/json';
  const res = await fetch(url);
  if (!res.ok) throw new Error(`iTunes feed returned ${res.status}`);
  const json = await res.json();

  const entries = json.feed.entry || [];
  const movies = entries.map(entry => ({
    title:  entry['im:name'].label,
    artist: entry['im:artist']?.label || '',
    genre:  entry.category?.attributes?.label || '',
    price:  entry['im:price']?.label || '',
    art:    entry['im:image']?.[2]?.label || entry['im:image']?.[0]?.label || null,
  }));

  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(movies));
    localStorage.setItem(CACHE_TS, String(now));
  } catch(e) {}

  return movies;
}

async function init() {
  try {
    const movies = await fetchMovies();
    document.getElementById('updated-time').textContent = formatDate(new Date());
    renderMovies(movies);
  } catch(e) {
    document.getElementById('scroll-track').innerHTML =
      `<div class="error">Unable to load movies.<br>${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
