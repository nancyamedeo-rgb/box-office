<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekend Box Office</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#E8B94A; --gold-dim:#9C7E3C;
    --bg:transparent;
    --card:rgba(42,15,18,0.55);
    --card-edge:rgba(232,185,74,0.22);
    --cream:#F2E9DD; --cream-dim:#B8A89C;
    --rose:#8C7A78;
    --green:#5FBF6F; --red:#E2685A;
    --rule:rgba(232,185,74,0.18);
  }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:transparent;
    font-family:'Inter',sans-serif; color:var(--cream);
  }

  .stage {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    background:transparent;
  }

  /* ── MASTHEAD ── */
  .masthead {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:3% 6% 2%;
    flex-shrink:0;
  }
  .masthead-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(64px, 4.2vw, 80px);
    letter-spacing:0.04em;
    color:var(--gold);
    line-height:1;
  }
  .masthead-sub {
    font-size:clamp(32px, 1.5vw, 30px);
    color:var(--rose);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:0.4em;
  }
  .masthead-weekend {
    font-size:clamp(32px, 1.6vw, 32px);
    color:var(--cream-dim);
    text-align:right;
    white-space:nowrap;
  }

  .status-line {
    padding:0 6% 2%;
    font-size:clamp(26px, 1.1vw, 24px);
    color:var(--gold-dim);
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  .status-line.error { color:var(--red); }

  /* ── SCROLL AREA ── */
  .scroll-wrapper { flex:1; overflow:hidden; position:relative; }
  .scroll-track { display:flex; flex-direction:column; }

  /* ── FILM ROW ── */
  .film-row {
    display:flex; align-items:center; gap:4%;
    padding:3.2% 6%;
    position:relative;
  }
  .film-row::after {
    content:"";
    position:absolute; left:6%; right:6%; bottom:0;
    height:1px;
    background-image: linear-gradient(90deg, var(--rule) 50%, transparent 50%);
    background-size: 14px 1px;
  }

  .rank-block {
    flex-shrink:0;
    width:11%;
    display:flex; flex-direction:column; align-items:center;
    font-family:'Bebas Neue',sans-serif;
  }
  .rank-num {
    font-size:clamp(72px, 6vw, 104px);
    color:var(--gold);
    line-height:0.9;
  }
  .rank-new {
    margin-top:0.3em;
    font-family:'Inter',sans-serif;
    font-size:clamp(24px, 1vw, 22px);
    font-weight:700;
    letter-spacing:0.1em;
    color:#16080A;
    background:var(--gold);
    border-radius:3px;
    padding:0.15em 0.6em;
    text-transform:uppercase;
  }

  .poster-block {
    flex-shrink:0;
    width:11%;
    aspect-ratio:2/3;
    border-radius:3px;
    overflow:hidden;
    background:rgba(232,185,74,0.08);
    display:flex; align-items:center; justify-content:center;
  }
  .poster-block img {
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .poster-fallback {
    font-size:clamp(36px, 2.2vw, 40px);
    color:var(--gold-dim);
    line-height:1;
  }

  .film-info {
    flex:1; min-width:0;
    display:flex; flex-direction:column; gap:0.3em;
  }
  .film-title {
    font-size:clamp(40px, 2.6vw, 50px);
    font-weight:700;
    color:var(--cream);
    line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .film-meta {
    font-size:clamp(28px, 1.4vw, 28px);
    color:var(--rose);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .film-meta .distributor { color:var(--cream-dim); }

  .film-figures {
    flex-shrink:0;
    text-align:right;
    display:flex; flex-direction:column; gap:0.25em;
    font-variant-numeric: tabular-nums;
  }
  .figure-gross {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(44px, 3vw, 56px);
    color:var(--gold);
    letter-spacing:0.02em;
    line-height:1;
  }
  .figure-change {
    font-size:clamp(28px, 1.4vw, 28px);
    font-weight:600;
  }
  .figure-change.pos { color:var(--green); }
  .figure-change.neg { color:var(--red); }
  .figure-change.flat { color:var(--cream-dim); }
  .figure-total {
    font-size:clamp(26px, 1.2vw, 24px);
    color:var(--rose);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="masthead">
    <div>
      <div class="masthead-title">BOX OFFICE</div>
      <div class="masthead-sub">Domestic Weekend Chart</div>
    </div>
    <div class="masthead-weekend" id="weekendLabel">—</div>
  </div>
  <div class="status-line" id="statusLine">Loading…</div>

  <div class="scroll-wrapper">
    <div class="scroll-track" id="scrollTrack"></div>
  </div>
</div>

<script>
/* ── CONFIG ──
   Replace OWNER/REPO with your GitHub username and repo name, pointing at
   the raw JSON file kept up to date by the GitHub Action
   (see .github/workflows/update-boxoffice.yml + scripts/fetch_boxoffice.py). */
const DATA_URL = "https://raw.githubusercontent.com/nancyamedeo-rgb/box-office/main/data/boxoffice.json";

const SCROLL_SPEED = 0.4; // px per frame, matches the World Cup widget's pace

function money(n) {
  if (n === null || n === undefined) return "—";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1e3) return "$" + Math.round(n / 1e3) + "K";
  return "$" + n;
}

function changeClass(pct) {
  if (!pct) return "flat";
  if (pct.startsWith("+")) return "pos";
  if (pct.startsWith("-")) return "neg";
  return "flat";
}

function buildFilmRow(film) {
  const changeCls = changeClass(film.changePct);
  const changeText = film.changePct ? film.changePct : "NEW";
  const metaParts = [];
  if (film.distributor) metaParts.push(`<span class="distributor">${film.distributor}</span>`);
  if (film.theaters) metaParts.push(film.theaters.toLocaleString() + " theaters");
  if (film.weeksInRelease) metaParts.push("Wk " + film.weeksInRelease);

  const posterHtml = film.poster
    ? `<img src="${film.poster}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'poster-fallback',textContent:'🎬'}))">`
    : `<div class="poster-fallback">🎬</div>`;

  return `<div class="film-row">
    <div class="rank-block">
      <div class="rank-num">${film.rank}</div>
      ${film.isNew ? '<div class="rank-new">New</div>' : ''}
    </div>
    <div class="poster-block">${posterHtml}</div>
    <div class="film-info">
      <div class="film-title">${film.title}</div>
      <div class="film-meta">${metaParts.join(" · ")}</div>
    </div>
    <div class="film-figures">
      <div class="figure-gross">${money(film.weekendGross)}</div>
      <div class="figure-change ${changeCls}">${changeText}</div>
      ${film.totalGross ? `<div class="figure-total">Total ${money(film.totalGross)}</div>` : ''}
    </div>
  </div>`;
}

let scrollPos = 0, scrollRAF = null;
function startScroll() {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  const track = document.getElementById("scrollTrack");
  const half = track.scrollHeight / 2;
  if (half <= 0) return;
  function step() {
    scrollPos += SCROLL_SPEED;
    if (scrollPos >= half) scrollPos = 0;
    track.style.transform = "translateY(-" + scrollPos + "px)";
    scrollRAF = requestAnimationFrame(step);
  }
  scrollRAF = requestAnimationFrame(step);
}

function setStatus(msg, isError) {
  const el = document.getElementById("statusLine");
  el.textContent = msg;
  el.className = "status-line" + (isError ? " error" : "");
}

async function fetchBoxOffice() {
  setStatus("Fetching latest standings…", false);
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("Fetch failed: HTTP " + res.status);
    const data = await res.json();

    if (data.status === "error" || !data.films || data.films.length === 0) {
      throw new Error(data.lastError || "No box office data available yet");
    }

    document.getElementById("weekendLabel").textContent = data.weekendLabel || "";

    const track = document.getElementById("scrollTrack");
    const rowsHtml = data.films.map(buildFilmRow).join("");
    track.innerHTML = rowsHtml + rowsHtml; // duplicate for seamless loop
    startScroll();

    const updated = data.updatedAt ? new Date(data.updatedAt) : new Date();
    const label = data.status === "stale"
      ? "Showing cached data from " + updated.toLocaleTimeString()
      : "Updated " + updated.toLocaleTimeString();
    setStatus(label, data.status === "stale");
  } catch (e) {
    console.error("Box office fetch error:", e);
    setStatus("Update failed — showing last data", true);
  }
}

fetchBoxOffice();
setInterval(fetchBoxOffice, 15 * 60 * 1000);   // poll every 15 min
setTimeout(() => location.reload(), 6 * 60 * 60 * 1000); // safety-net reload every 6 hrs
</script>
</body>
</html>
